<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDFC Mutual Fund Assistant</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>🏦 HDFC Mutual Fund Assistant</h1>
            <p>Ask me anything about select HDFC Mutual Funds.</p>
        </header>
        
        <div id="chat-messages" class="messages-container"></div>
        
        <div class="suggestions" id="suggestions"></div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
