name: Daily Data Sync

on:
  schedule:
    # Every 5 minutes (for testing)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browser
        run: playwright install chromium --with-deps

      - name: Phase 1 — Scrape Fund Data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: hdfc-mutual-funds
          EMBEDDING_MODEL: models/gemini-embedding-001
        run: python -m phase1.run_scraper

      - name: Phase 2 — Process & Chunk Data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: hdfc-mutual-funds
          EMBEDDING_MODEL: models/gemini-embedding-001
        run: python -m phase2.run_processor

      - name: Phase 3 — Rebuild Vector Store
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: hdfc-mutual-funds
          EMBEDDING_MODEL: models/gemini-embedding-001
        run: python -m phase3.run_vectorstore --rebuild
